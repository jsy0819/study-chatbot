# ─────────────────────────────────────────────────────────────
# prod 프로파일 (운영용) — Railway에서 SPRING_PROFILES_ACTIVE=prod 로 활성화
# 공통 설정은 application.properties에 있고, 여기에는 운영 안정성을 위한
# 환경별 항목만 둔다.
# ─────────────────────────────────────────────────────────────

# ── JPA / Hibernate (운영) ───────────────────────────────────
# validate: 엔티티와 실제 테이블 스키마가 일치하는지 "검증만" 한다(테이블 생성/변경 안 함).
# 전제: 배포된 DB는 그동안 update로 떠서 테이블이 이미 생성돼 있으므로 검증만 하면 된다.
# 주의: 엔티티와 실제 스키마가 불일치하면 validate가 앱 시작을 막는다(SchemaManagementException).
spring.jpa.hibernate.ddl-auto=validate
# 운영 로그 최소화 — SQL 출력 비활성화
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
