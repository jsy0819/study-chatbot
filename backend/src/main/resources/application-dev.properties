# ─────────────────────────────────────────────────────────────
# dev 프로파일 (로컬 개발용) — 기본 활성 프로파일
# 공통 설정은 application.properties에 있고, 여기에는 개발 편의를 위한
# 환경별 항목만 둔다.
# ─────────────────────────────────────────────────────────────

# ── JPA / Hibernate (개발) ───────────────────────────────────
# update: 엔티티 변경 시 테이블을 자동 반영 (개발 편의). 운영에서는 절대 사용하지 않는다.
spring.jpa.hibernate.ddl-auto=update
# 실행 SQL을 콘솔에 출력 + 포맷팅 (디버깅용)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
