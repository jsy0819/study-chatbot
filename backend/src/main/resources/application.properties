spring.application.name=backend

# ── 활성 프로파일 ─────────────────────────────────────────────
# 로컬: 기본으로 dev 프로파일이 켜진다(개발 편의 설정 적용).
# 배포(Railway): 환경변수 SPRING_PROFILES_ACTIVE=prod 를 주입하면 prod로 덮어쓴다.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── 서버 포트 ─────────────────────────────────────────────────
# 로컬: 기본 8080. 배포(Railway): 플랫폼이 주입하는 PORT 환경변수를 따른다.
server.port=${PORT:8080}

# ── PostgreSQL ──────────────────────────────────────────────
# host/port/db를 환경변수로 외부화하되 로컬 기본값을 둬서 로컬 개발은 그대로 동작한다.
# 배포(Railway)에서는 Railway Postgres가 제공하는 PG* 변수로 자동 덮어쓴다.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:studychatbot}
spring.datasource.driver-class-name=org.postgresql.Driver

# 비밀번호는 코드에 절대 하드코딩하지 않고 환경변수에서 주입받는다.
# 중첩 기본값: PGUSER/PGPASSWORD(Railway)가 있으면 그것을, 없으면 기존
# POSTGRES_USER/POSTGRES_PASSWORD(로컬 .env)를 읽는다 → 양쪽 모두 동작.
spring.datasource.username=${PGUSER:${POSTGRES_USER}}
spring.datasource.password=${PGPASSWORD:${POSTGRES_PASSWORD}}

# ── JPA / Hibernate ─────────────────────────────────────────
# 환경별로 갈리는 항목(ddl-auto, show-sql, format_sql)은 프로파일 파일로 분리한다.
#   - application-dev.properties  : update / show-sql=true  (개발 편의)
#   - application-prod.properties : validate / show-sql=false (운영 안정성·로그 최소화)
# 여기에는 환경 무관 공통 JPA 설정만 둔다(현재는 없음).

# ── Redis ────────────────────────────────────────────────────
# 로컬 기본값(localhost:6379, 비밀번호 없음). 배포에서는 REDIS_* 변수로 덮어쓴다.
# 관리형 Redis는 비밀번호가 필수이므로 REDIS_PASSWORD를 받되, 로컬은 빈 값(인증 없음).
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
# Spring Boot 3.x는 기본값으로 Lettuce를 선택한다.
# RedisVectorStoreAutoConfiguration은 @ConditionalOnBean(JedisConnectionFactory.class) 조건을 가지므로
# jedis로 명시해야 JedisConnectionFactory 빈이 생성되고 VectorStore 자동 구성이 활성화된다.
# StringRedisTemplate(리프레시 토큰)도 Jedis 기반으로 동일하게 동작한다.
spring.data.redis.client-type=jedis

# ── JWT ──────────────────────────────────────────────────────
# 서명 키는 절대 코드에 하드코딩하지 않고 .env → 환경변수로 주입
jwt.secret=${JWT_SECRET}
# 액세스 토큰 만료시간: 30분 (밀리초)
jwt.access-expiration-ms=3600000
# 리프레시 토큰 만료시간: 14일 (밀리초)
jwt.refresh-expiration-ms=1209600000

# ── Multipart (파일 업로드) ───────────────────────────────────
# PDF 업로드 최대 크기. MaxUploadSizeExceededException → 413 응답
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

# ── Gemini (GeminiClient 롤백용 — 현재 미사용) ───────────────
gemini.api.key=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash
gemini.api.base-url=https://generativelanguage.googleapis.com

# ── Spring AI (Google GenAI / Gemini) ────────────────────────
# GeminiClient를 대체하는 Spring AI ChatClient 설정
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# 임베딩 연결: chat과 다른 별도 prefix (spring.ai.google.genai.embedding.*) 이므로 api-key 재지정 필요
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY}
# 임베딩 모델: gemini-embedding-001 (3072차원, 100+ 언어, AI Studio API 키 방식 전용)
# text-embedding-004는 Vertex AI 전용 — AI Studio API 키(v1beta)에서 404 발생
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001

# ── 임베딩 차원 ───────────────────────────────────────────────
# Spring AI의 GoogleGenAiTextEmbeddingModel이 gemini-embedding-001의 차원을 768로 잘못 반환하는
# 버그를 우회하기 위한 값. RedisVectorStore는 embeddingModel.dimensions()로만 인덱스 차원을
# 결정하므로 FixedDimensionEmbeddingModel 래퍼로 이 값을 강제 주입한다.
# 임베딩 모델을 바꾸면 이 값도 반드시 함께 바꿔야 한다.
app.embedding.dimensions=3072

# ── Spring AI Redis VectorStore ───────────────────────────────
# Redis 연결은 spring.data.redis.* 설정을 그대로 재사용한다.
# FT.CREATE로 생성될 RediSearch 인덱스 이름
spring.ai.vectorstore.redis.index-name=study-chunks
# 벡터 키 접두사 (Redis 키: "study-chunk:<uuid>")
spring.ai.vectorstore.redis.prefix=study-chunk:
# 앱 기동 시 인덱스가 없으면 자동 생성 (1.1.7부터 기본값이 false로 변경됨 — 명시 필요)
spring.ai.vectorstore.redis.initialize-schema=true
