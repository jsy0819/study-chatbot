services:
  postgres:
    image: postgres:16
    container_name: studychatbot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: studychatbot
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d studychatbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: studychatbot-redis
    ports:
      - "6379:6379"
    environment:
      # redis-stack-server는 커스텀 엔트리포인트로 RediSearch 모듈을 로드한다.
      # command를 직접 오버라이드하면 모듈이 누락되므로 REDIS_ARGS로 옵션을 전달한다.
      REDIS_ARGS: "--appendonly yes"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
